<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="/static/style.css">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<title>Photos</title>

</head>

<body id="appBody" class="dark">

<!-- NAVBAR -->
<div class="navbar">

<div class="max-w-6xl mx-auto p-6 flex justify-between items-center">

<div>
<h1 class="text-3xl font-bold">Gallery</h1>
<p class="text-gray-400 text-sm">Photo Private Andre Firmansah</p>
</div>

<a href="/logout" class="text-red-400 hover:text-red-500 transition">

<svg xmlns="http://www.w3.org/2000/svg"
class="w-7 h-7"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M17 16l4-4m0 0l-4-4m4 4H7"/>

</svg>

</a>

</div>

</div>


<div class="max-w-6xl mx-auto p-6">

<div class="flex justify-center mb-10">

<div class="collection-container">
<h4 id="gridBtn" class="collection-btn">
Collection
</h4>
</div>

</div>


<div id="progressBox" class="hidden w-full bg-gray-800 rounded mb-6">
<div id="progressBar" class="bg-blue-500 h-2 rounded w-0"></div>
</div>


<div id="gallery"
class="columns-2 sm:columns-2 md:columns-3 gap-4 space-y-4">

{% for photo in photos %}

<div class="relative break-inside-avoid group">

<div class="relative">

<div class="skeleton absolute inset-0 rounded-xl"></div>

<img
src="/thumb/{{photo}}"
loading="lazy"
class="rounded-xl w-full cursor-pointer select-none hover:scale-105 transition duration-300 img-real"
onclick="openViewer('/photo/{{photo}}')"
onload="showImage(this)"
>

</div>

<button
onclick="openDeleteModal('{{photo}}')"
class="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-1 rounded opacity-90 hover:bg-red-700">

Delete

</button>

</div>

{% endfor %}

</div>

</div>


<!-- FLOATING UPLOAD BUTTON -->
<div class="fab-container">

<button
id="uploadBtn"
onclick="toggleUploadMenu()"
class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-500 w-14 h-14 rounded-full text-2xl shadow-lg flex items-center justify-center z-50">

+

</button>

</div>


<input type="file" id="fileInput" accept="image/*" class="hidden">


<!-- IMAGE VIEWER -->
<div id="viewer" class="hidden fixed inset-0 bg-black flex items-center justify-center z-50">

<img id="viewerImg" class="max-h-[95%] max-w-[95%] rounded-xl">

</div>


<!-- DROPZONE -->
<div id="dropzone"
class="max-w-6xl mx-auto border-2 border-dashed border-gray-700 p-8 rounded-xl text-center mb-10">

<span class="no-select">Drop photo here or click +</span>

</div>


<!-- FOOTER -->
<footer class="w-full text-center text-gray-400 text-xs mt-12 mb-6">

<div class="flex justify-center mb-4">

<label class="theme-switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>

</div>

<div>Made with ❤️ by Andre Firmansah</div>
<div id="time"></div>

</footer>


<!-- DELETE MODAL -->
<div id="deleteModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-50">

<div class="delete-modal">

<h2 class="delete-title">Delete Photo</h2>
<p class="delete-text">Are you sure you want to delete this photo?</p>

<div class="delete-actions">

<button onclick="closeDeleteModal()" class="btn-cancel">
Cancel
</button>

<button id="confirmDelete" class="btn-delete">
Delete
</button>

</div>

</div>

</div>


<script src="/static/script.js"></script>

</body>
</html>
